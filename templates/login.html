<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Logic Gate Simulator</title>
  <link rel="stylesheet" href="/static/auth.css"/>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-top">
        <div class="auth-icon">⚡</div>
        <h1>Welcome Back</h1>
        <p class="tagline">Sign in to Logic Gate Simulator</p>
      </div>
      <div class="error-box" id="error-box"></div>
      <div class="field-group">
        <label>Email Address <span class="req">*</span></label>
        <div class="inp-wrap">
          <span class="inp-icon">✉</span>
          <input type="email" id="email" placeholder="you@example.com" required/>
        </div>
      </div>
     
      <div class="field-group">
        <label>Password <span class="req">*</span></label>
        <div class="inp-wrap">
          <span class="inp-icon">🔒</span>
          <input type="password" id="password" placeholder="••••••••" required/>
          <span class="eye-toggle" onclick="togglePassword('password', this)">👁</span>
        </div>
      </div>
      <div class="forgot-row">
        <a href="/forgot">Forgot password?</a>
      </div>
      <button class="auth-btn" onclick="login()">Sign In →</button>
      <div class="auth-footer">
        Don't have an account? <a href="/register">Create one</a>
      </div>
    </div>
  </div>
  <script src="/static/auth.js"></script>
</body>
</html>
