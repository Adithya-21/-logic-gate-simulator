<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password | Logic Gate Simulator</title>
  <link rel="stylesheet" href="/static/auth.css"/>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">

      <div class="auth-top">
        <div class="auth-icon">🔑</div>
        <h1>Reset Password</h1>
        <p class="tagline">Answer your secret question to continue</p>
      </div>

      <div class="error-box" id="error-box"></div>
      <div class="success-box" id="success-box"></div>

      <div class="field-group">
        <label>Email Address <span class="req">*</span></label>
        <div class="inp-wrap">
          <span class="inp-icon">✉</span>
          <input type="email" id="email" placeholder="you@example.com" required/>
        </div>
      </div>

      <div class="field-group">
  <label>What is your best friend's name? <span class="req">*</span></label>
  <div class="inp-wrap">
    <span class="inp-icon">👫</span>
    <input type="text" id="secret_answer" placeholder="Your best friend's name" required/>
  </div>
</div>

      <div class="field-group">
  <label>New Password <span class="req">*</span></label>
  <div class="inp-wrap">
    <span class="inp-icon">🔒</span>
    <input type="password" id="new_password" placeholder="Min 6 characters" required/>
    <span class="eye-toggle" onclick="togglePassword('new_password', this)">👁</span>
  </div>
</div>

      <button class="auth-btn" onclick="forgotPassword()">Reset Password →</button>

      <div class="auth-footer">
        Remembered it? <a href="/login">Back to Sign In</a>
      </div>

    </div>
  </div>
  <script src="/static/auth.js"></script>
</body>
</html>
